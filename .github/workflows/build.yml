name: Build Windows EXE

# 触发条件：当你推送代码到 master/main 分支时
on:
  push:
    branches:
      - master  # 如果你的默认分支是 main，请改为 - main

jobs:
  build:
    runs-on: windows-latest  # 使用 Windows 运行器

    steps:
      # 1. 检出你的代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # 你可以根据需要更改 Python 版本

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install pyinstaller flask  # 如果有其他依赖，请一并列出

      # 4. 执行打包命令
      - name: Build EXE
        run: |
          pyinstaller --onefile --console app.py
      # 5. 上传生成的文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/app.exe  # pyinstaller 默认将生成的文件放在 dist 目录下
