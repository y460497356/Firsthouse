<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时消息系统</title>
    <style>
        body { font-family: "微软雅黑", sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #message-list { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 15px; background: #fff; border-radius: 4px; }
        .message-item { background: #e9f7ef; padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; color: #333; }
        input[type="text"] { width: calc(100% - 120px); padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 10px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h3>实时消息系统 (最新10条)</h3>
    
    <!-- 消息展示区 -->
    <div id="message-list">
        {% for msg in messages %}
            <div class="message-item">{{ msg }}</div>
        {% endfor %}
    </div>

    <!-- 输入框和按钮 -->
    <form id="sendForm">
        <input type="text" id="content" placeholder="请输入要发送的内容..." required>
        <button type="submit">发送</button>
    </form>
</div>

<script>
// --- 新增：建立实时连接 ---
const eventSource = new EventSource('/stream');

eventSource.onmessage = function(event) {
    // 当收到服务器推送的消息时，自动更新页面
    const data = JSON.parse(event.data);
    updateMessageList(data.messages);
};

eventSource.onerror = function() {
    console.error("实时连接出错，尝试重连...");
    // SSE 会自动尝试重连，这里可以添加错误提示
};
// --- 新增结束 ---

// 将更新列表的逻辑提取出来，方便复用
function updateMessageList(messages) {
    const list = document.getElementById('message-list');
    list.innerHTML = '';
    messages.forEach(msg => {
        const item = document.createElement('div');
        item.className = 'message-item';
        item.textContent = msg;
        list.appendChild(item);
    });
    list.scrollTop = list.scrollHeight;
}

document.getElementById('sendForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const content = document.getElementById('content').value;

    fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: content })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('content').value = '';
            // 发送成功后，也更新一下列表（其实服务器推送也会触发更新）
            updateMessageList(data.messages);
        } else {
            alert('发送失败: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('发送失败: 网络错误');
    });
});
</script>

</body>
</html>
