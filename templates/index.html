<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时消息系统</title>
    <style>
        body { font-family: "微软雅黑", sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #message-list { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 15px; background: #fff; border-radius: 4px; }
        .message-item { background: #e9f7ef; padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; color: #333; }
        input[type="text"] { width: calc(100% - 120px); padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 10px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h3>实时消息系统 (最新10条)</h3>
    
    <!-- 消息展示区 -->
    <div id="message-list">
        {% for msg in messages %}
            <div class="message-item">{{ msg }}</div>
        {% endfor %}
    </div>

    <!-- 输入框和按钮 -->
    <form id="sendForm">
        <input type="text" id="content" placeholder="请输入要发送的内容..." required>
        <button type="submit">发送</button>
    </form>
</div>

<script>
document.getElementById('sendForm').addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止页面刷新

    const content = document.getElementById('content').value;

    fetch('/send', {
        method: 'POST',
        body: new FormData(this)
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('content').value = ''; // 清空输入框
            
            // 更新列表
            const list = document.getElementById('message-list');
            list.innerHTML = ''; // 清空旧内容
            
            data.messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'message-item';
                item.textContent = msg;
                list.appendChild(item);
            });

            // 自动滚动到底部
            list.scrollTop = list.scrollHeight;
        }
    });
});
</script>

</body>
</html>
